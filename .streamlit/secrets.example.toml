# Copy this file to .streamlit/secrets.toml (do NOT commit real secrets)
[connections.gsheets]
type = "service_account"
project_id = "your-project-id"
# Replace literal \n with newlines when pasting in Streamlit Cloud UI
private_key = "-----BEGIN PRIVATE KEY-----\\n...\\n-----END PRIVATE KEY-----\\n"
client_email = "service-account@project.iam.gserviceaccount.com"
spreadsheet = "https://docs.google.com/spreadsheets/d/your-sheet-id"

# Optional: override mobile audio delivery.
# By default the Streamlit mobile component plays same-origin files from
# mobile_app/audio/ and mobile_app/sentence-audio/.
# The *_base_url values are for hosts that expose <base_url>/<audioKey>.wav.
[mobile_audio]
drive_download_base_url = "https://drive.google.com/uc?export=download&id="
vocab_base_url = ""
sentence_base_url = ""
